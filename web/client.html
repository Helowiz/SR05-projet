<html>
  <body>
    <b>WebSocket</b>
    <form>
      <p>
        <button id="connecter">Connecter</button>
        <button id="fermer">Fermer</button>
        host : <input id="host" type="text" size="10" value="localhost" /> port
        : <input id="port" type="text" maxlength="5" size="5" value="4444" />
      </p>
    </form>
    <b> Application </b>
    <div>
      <p>
        <button id="debut_sc">demander section critique</button>
        <button id="fin_sc">fin section critique</button>
      </p>
    </div>
    <hr />
    <b> Logs </b>
    <div id="logs" style="max-height: 40vh; overflow-y: scroll"></div>

    <script>
      var ws;

      function addToLog(message) {
        var logs = document.getElementById("logs");
        var d = document.createElement("div");
        d.textContent = message;
        logs.appendChild(d);
        logs.scroll(0, logs.scrollHeight);
      }

      document.getElementById("connecter").onclick = function (evt) {
        if (ws) {
          return false;
        }

        var host = document.getElementById("host").value;
        var port = document.getElementById("port").value;

        addToLog("Tentative de connexion");
        addToLog("host = " + host + ", port = " + port);

        ws = new WebSocket("ws://" + host + ":" + port + "/ws");
        ws.onopen = function (evt) {
          addToLog("Websocket ouverte");
        };

        ws.onclose = function (evt) {
          addToLog("Websocket fermée");
          ws = null;
        };

        ws.onmessage = function (evt) {
          addToLog("Réception: " + evt.data);
        };

        ws.onerror = function (evt) {
          addToLog("Erreur: " + evt.data);
        };
        return false;
      };

      document.getElementById("fermer").onclick = function (evt) {
        if (!ws) {
          return false;
        }
        ws.close();
        return false;
      };

      document.getElementById("debut_sc").onclick = function (evt) {
        if (!ws) {
          return false;
        }
        ws.send("section_critique");
        return false;
      };
      document.getElementById("fin_sc").onclick = function (evt) {
        if (!ws) {
          return false;
        }
        ws.send("f_section_critique");
        return false;
      };
    </script>
  </body>
</html>
