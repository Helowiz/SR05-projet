<html>
  <head>
    <title>🖼️ Collaborative Whiteboard</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
  </head>
  <body>
    <b>WebSocket</b>
    <form>
      <p>
        <button id="connecter">Connecter</button>
        <button id="fermer">Fermer</button>
        host : <input id="host" type="text" size="10" value="localhost" /> port
        : <input id="port" type="text" maxlength="5" size="5" value="4444" />
      </p>
    </form>
    <div><button id="snapshot">Snapshot</button></div>

    <!-- <b> Application </b>
    <h3>data : <span id = "data"></span><h3>
    <div>
      <p>
        <button id="debut_sc">demander section critique</button>
        <button id="fin_sc">fin section critique</button>
        <button id="update">incrementer</button>
      </p>
    </div> -->

    <div id="toolbar">
      <button class="tool-btn active" data-tool="select">▶ SELECT</button>
      <button class="tool-btn" data-tool="rect">▭ RECT</button>
      <button class="tool-btn" data-tool="circle">○ CIRCLE</button>
      <button class="tool-btn" data-tool="text">T TEXT</button>
      <div class="sep"></div>
      <button class="tool-btn" id="delete-btn">✕ DELETE</button>
      <button class="tool-btn" id="clear-btn">⊘ CLEAR ALL</button>
      <div class="sep"></div>
      <span id="hint">V · R · C · T · DEL</span>
    </div>

    <div id="main">
      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>

      <div id="props">
        <h3>Properties</h3>
        <div id="no-selection">No shape selected</div>
        <div
          id="shape-props"
          style="display: none; display: flex; flex-direction: column; gap: 8px"
        >
          <div class="prop-row">
            <label>ID</label>
            <input id="prop-id" type="text" readonly />
          </div>
          <div class="prop-row">
            <label>X</label>
            <input id="prop-x" type="number" />
          </div>
          <div class="prop-row">
            <label>Y</label>
            <input id="prop-y" type="number" />
          </div>
          <div id="wh-props">
            <div class="prop-row" style="margin-bottom: 8px">
              <label>Width</label>
              <input id="prop-w" type="number" />
            </div>
            <div class="prop-row">
              <label>Height</label>
              <input id="prop-h" type="number" />
            </div>
          </div>
          <div id="r-prop" style="display: none">
            <div class="prop-row">
              <label>Radius</label>
              <input id="prop-r" type="number" />
            </div>
          </div>
          <!-- <div
            id="text-prop"
            style="
              display: none;
              display: flex;
              flex-direction: column;
              gap: 8px;
            "
          > -->
          <div id="text-prop" style="display: none">
            <div class="prop-row">
              <label>Text</label>
              <input id="prop-value" type="text" />
            </div>
            <div class="prop-row">
              <label>Font Size</label>
              <input id="prop-size" type="number" />
            </div>
          </div>

          <div class="prop-row">
            <label>Fill Color</label>
            <input id="prop-color" type="color" value="#4488ff" />
          </div>
        </div>
      </div>
    </div>

    <hr />

    <div id="logs">
      <b id="log-header"> Logs </b>
      <div id="log-messages" style="max-height: 40vh; overflow-y: scroll"></div>
    </div>


    <script src="scripts.js"></script>
  </body>
</html>
