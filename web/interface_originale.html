<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Canvas Protocol Editor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0d0d0d;
        color: #d0d0d0;
        font-family: "Courier New", monospace;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        user-select: none;
      }

      #toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 8px 12px;
        background: #111;
        border-bottom: 1px solid #222;
        flex-shrink: 0;
      }

      .tool-btn {
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        color: #777;
        padding: 5px 12px;
        cursor: pointer;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.05em;
        transition: all 0.1s;
      }
      .tool-btn:hover {
        background: #222;
        color: #bbb;
        border-color: #444;
      }
      .tool-btn.active {
        background: #021a0d;
        border-color: #00cc66;
        color: #00ff88;
      }

      .sep {
        width: 1px;
        height: 20px;
        background: #222;
        margin: 0 6px;
      }

      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      #canvas-wrap {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #141414;
      }

      #canvas {
        display: block;
      }

      /* ---- Props Panel ---- */
      #props {
        width: 190px;
        background: #0f0f0f;
        border-left: 1px solid #1e1e1e;
        padding: 12px 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        flex-shrink: 0;
      }

      #props h3 {
        color: #00ff88;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding-bottom: 6px;
        border-bottom: 1px solid #1e1e1e;
        margin-bottom: 2px;
      }

      .prop-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .prop-row label {
        font-size: 9px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .prop-row input[type="text"],
      .prop-row input[type="number"] {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        color: #bbb;
        padding: 4px 6px;
        font-family: inherit;
        font-size: 12px;
        width: 100%;
        transition: border-color 0.1s;
      }
      .prop-row input:focus {
        outline: none;
        border-color: #00cc66;
        color: #eee;
      }
      .prop-row input[readonly] {
        color: #444;
      }

      .prop-row input[type="color"] {
        width: 100%;
        height: 28px;
        padding: 2px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        cursor: pointer;
      }

      #no-selection {
        color: #333;
        font-size: 11px;
        padding: 4px 0;
      }

      /* ---- Bottom / Log ---- */
      #bottom {
        background: #0a0a0a;
        border-top: 1px solid #1a1a1a;
        padding: 6px 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        flex-shrink: 0;
        max-height: 190px;
      }

      #log-header {
        font-size: 9px;
        color: #333;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      #log {
        overflow-y: auto;
        max-height: 110px;
        min-height: 40px;
        flex: 1;
      }

      .log-entry {
        display: flex;
        gap: 6px;
        padding: 1px 0;
        font-size: 11px;
        border-bottom: 1px solid #111;
        line-height: 1.5;
      }
      .log-entry .dir {
        flex-shrink: 0;
        font-size: 10px;
      }
      .log-entry.out .dir {
        color: #00cc66;
      }
      .log-entry.in .dir {
        color: #0088ff;
      }
      .log-entry .msg {
        color: #555;
        word-break: break-all;
      }

      #input-row {
        display: flex;
        gap: 6px;
      }

      #msg-input {
        flex: 1;
        background: #111;
        border: 1px solid #2a2a2a;
        color: #aaa;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 11px;
      }
      #msg-input:focus {
        outline: none;
        border-color: #0066cc;
      }
      #msg-input::placeholder {
        color: #333;
      }

      #recv-btn {
        background: #001122;
        border: 1px solid #004488;
        color: #0088ff;
        padding: 5px 14px;
        cursor: pointer;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.05em;
      }
      #recv-btn:hover {
        background: #001a33;
      }

      /* ---- Keymap hint ---- */
      #hint {
        font-size: 9px;
        color: #2a2a2a;
        letter-spacing: 0.06em;
        padding: 0 2px;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button class="tool-btn active" data-tool="select">▶ SELECT</button>
      <button class="tool-btn" data-tool="rect">▭ RECT</button>
      <button class="tool-btn" data-tool="circle">○ CIRCLE</button>
      <button class="tool-btn" data-tool="text">T TEXT</button>
      <div class="sep"></div>
      <button class="tool-btn" id="delete-btn">✕ DELETE</button>
      <button class="tool-btn" id="clear-btn">⊘ CLEAR ALL</button>
      <div class="sep"></div>
      <span id="hint">V · R · C · T · DEL</span>
    </div>

    <div id="main">
      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>

      <div id="props">
        <h3>Properties</h3>
        <div id="no-selection">No shape selected</div>
        <div
          id="shape-props"
          style="display: none; display: flex; flex-direction: column; gap: 8px"
        >
          <div class="prop-row">
            <label>ID</label>
            <input id="prop-id" type="text" readonly />
          </div>
          <div class="prop-row">
            <label>X</label>
            <input id="prop-x" type="number" />
          </div>
          <div class="prop-row">
            <label>Y</label>
            <input id="prop-y" type="number" />
          </div>
          <div id="wh-props">
            <div class="prop-row" style="margin-bottom: 8px">
              <label>Width</label>
              <input id="prop-w" type="number" />
            </div>
            <div class="prop-row">
              <label>Height</label>
              <input id="prop-h" type="number" />
            </div>
          </div>
          <div id="r-prop" style="display: none">
            <div class="prop-row">
              <label>Radius</label>
              <input id="prop-r" type="number" />
            </div>
          </div>
          <div
            id="text-prop"
            style="
              display: none;
              display: flex;
              flex-direction: column;
              gap: 8px;
            "
          >
            <div class="prop-row">
              <label>Text</label>
              <input id="prop-value" type="text" />
            </div>
            <div class="prop-row">
              <label>Font Size</label>
              <input id="prop-size" type="number" />
            </div>
          </div>
          <div class="prop-row">
            <label>Fill Color</label>
            <input id="prop-color" type="color" value="#4488ff" />
          </div>
        </div>
      </div>
    </div>

    <div id="bottom">
      <div id="log-header">Protocol Log</div>
      <div id="log"></div>
      <div id="input-row">
        <input
          id="msg-input"
          placeholder="Paste a protocol message and press Enter to receive…"
        />
        <button id="recv-btn">RECV</button>
      </div>
    </div>

    <script>
      // =========================================
      // Protocol
      // =========================================
      function encode(obj) {
        return Object.entries(obj)
          .map(([k, v]) => `/=${k}=${v}`)
          .join("");
      }

      function decode(str) {
        return Object.fromEntries(
          str
            .trim()
            .split("/=")
            .filter(Boolean)
            .map((pair) => {
              const i = pair.indexOf("=");
              return [pair.slice(0, i), pair.slice(i + 1)];
            }),
        );
      }

      // =========================================
      // State
      // =========================================
      let shapes = {}; // { id: shapeObj }
      let selectedId = null;
      let tool = "select";
      let idCounter = 0;

      // Interaction state
      let isDown = false;
      let mouseStart = { x: 0, y: 0 };
      let drawState = null; // while creating a shape by drag
      let dragState = null; // while moving / resizing

      function genId() {
        return "s" + (++idCounter).toString().padStart(4, "0");
      }

      // =========================================
      // Canvas setup
      // =========================================
      const HANDLE_SIZE = 7;
      const GRID = 20;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const wrap = document.getElementById("canvas-wrap");

      function resize() {
        canvas.width = wrap.clientWidth;
        canvas.height = wrap.clientHeight;
        redraw();
      }
      window.addEventListener("resize", resize);
      resize();

      // =========================================
      // Drawing
      // =========================================

      function drawGrid() {
        ctx.strokeStyle = "#191919";
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += GRID) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += GRID) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
        ctx.strokeStyle = "#1f1f1f";
        for (let x = 0; x < canvas.width; x += GRID * 5) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += GRID * 5) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
      }

      function drawShape(s, selected) {
        ctx.save();
        if (s.cmd === "rect") {
          ctx.fillStyle = s.color || "#4488ff";
          ctx.fillRect(+s.x, +s.y, +s.w, +s.h);
          if (selected) {
            drawSelectionRect(+s.x, +s.y, +s.w, +s.h);
            drawHandlesRect(+s.x, +s.y, +s.w, +s.h);
          }
        } else if (s.cmd === "circle") {
          ctx.fillStyle = s.color || "#ff8844";
          ctx.beginPath();
          ctx.arc(+s.x, +s.y, Math.abs(+s.r), 0, Math.PI * 2);
          ctx.fill();
          if (selected) {
            ctx.strokeStyle = "#00ff88";
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.arc(+s.x, +s.y, Math.abs(+s.r) + 1, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            drawHandlesCircle(+s.x, +s.y, +s.r);
          }
        } else if (s.cmd === "text") {
          const size = +(s.size || 20);
          ctx.fillStyle = s.color || "#ffffff";
          ctx.font = `${size}px 'Courier New', monospace`;
          ctx.fillText(s.value || "", +s.x, +s.y);
          if (selected) {
            const w = ctx.measureText(s.value || "").width;
            drawSelectionRect(+s.x, +s.y - size, w, size);
            drawHandlesRect(+s.x, +s.y - size, w, size);
          }
        }
        ctx.restore();
      }

      function drawSelectionRect(x, y, w, h) {
        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 3]);
        ctx.strokeRect(x - 1, y - 1, w + 2, h + 2);
        ctx.setLineDash([]);
      }

      function drawHandlesRect(x, y, w, h) {
        const pts = getHandlePointsRect(x, y, w, h);
        for (const [hx, hy] of pts) {
          ctx.fillStyle = "#00ff88";
          ctx.fillRect(
            hx - HANDLE_SIZE / 2,
            hy - HANDLE_SIZE / 2,
            HANDLE_SIZE,
            HANDLE_SIZE,
          );
          ctx.strokeStyle = "#001a0d";
          ctx.lineWidth = 1;
          ctx.strokeRect(
            hx - HANDLE_SIZE / 2,
            hy - HANDLE_SIZE / 2,
            HANDLE_SIZE,
            HANDLE_SIZE,
          );
        }
      }

      function drawHandlesCircle(cx, cy, r) {
        const pts = circleHandlePoints(cx, cy, r);
        for (const [hx, hy] of pts) {
          ctx.fillStyle = "#00ff88";
          ctx.fillRect(
            hx - HANDLE_SIZE / 2,
            hy - HANDLE_SIZE / 2,
            HANDLE_SIZE,
            HANDLE_SIZE,
          );
          ctx.strokeStyle = "#001a0d";
          ctx.lineWidth = 1;
          ctx.strokeRect(
            hx - HANDLE_SIZE / 2,
            hy - HANDLE_SIZE / 2,
            HANDLE_SIZE,
            HANDLE_SIZE,
          );
        }
      }

      // 8 handle positions for rect: TL TC TR ML MR BL BC BR
      function getHandlePointsRect(x, y, w, h) {
        return [
          [x, y],
          [x + w / 2, y],
          [x + w, y],
          [x, y + h / 2],
          [x + w, y + h / 2],
          [x, y + h],
          [x + w / 2, y + h],
          [x + w, y + h],
        ];
      }

      // 4 handles N E S W for circle
      function circleHandlePoints(cx, cy, r) {
        return [
          [cx, cy - r],
          [cx + r, cy],
          [cx, cy + r],
          [cx - r, cy],
        ];
      }

      function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        // All non-selected shapes first
        for (const s of Object.values(shapes)) {
          if (s.id !== selectedId) drawShape(s, false);
        }
        // Selected shape on top
        if (selectedId && shapes[selectedId]) {
          drawShape(shapes[selectedId], true);
        }

        // Preview while drawing
        if (drawState?.previewShape) {
          ctx.globalAlpha = 0.55;
          drawShape(drawState.previewShape, false);
          ctx.globalAlpha = 1;
        }
      }

      // =========================================
      // Hit testing
      // =========================================
      function hitTest(x, y) {
        const ids = Object.keys(shapes).reverse();
        for (const id of ids) {
          const s = shapes[id];
          if (s.cmd === "rect") {
            if (x >= +s.x && x <= +s.x + +s.w && y >= +s.y && y <= +s.y + +s.h)
              return id;
          } else if (s.cmd === "circle") {
            const dx = x - +s.x,
              dy = y - +s.y;
            if (Math.sqrt(dx * dx + dy * dy) <= Math.abs(+s.r)) return id;
          } else if (s.cmd === "text") {
            ctx.font = `${+(s.size || 20)}px 'Courier New', monospace`;
            const w = ctx.measureText(s.value || "").width;
            const h = +(s.size || 20);
            if (x >= +s.x && x <= +s.x + w && y >= +s.y - h && y <= +s.y)
              return id;
          }
        }
        return null;
      }

      function hitHandle(x, y, shape) {
        if (!shape) return -1;
        const hs = HANDLE_SIZE / 2 + 2;
        if (shape.cmd === "rect") {
          const pts = getHandlePointsRect(
            +shape.x,
            +shape.y,
            +shape.w,
            +shape.h,
          );
          for (let i = 0; i < pts.length; i++) {
            if (Math.abs(x - pts[i][0]) <= hs && Math.abs(y - pts[i][1]) <= hs)
              return i;
          }
        } else if (shape.cmd === "circle") {
          const pts = circleHandlePoints(+shape.x, +shape.y, +shape.r);
          for (let i = 0; i < pts.length; i++) {
            if (Math.abs(x - pts[i][0]) <= hs && Math.abs(y - pts[i][1]) <= hs)
              return i;
          }
        } else if (shape.cmd === "text") {
          ctx.font = `${+(shape.size || 20)}px 'Courier New', monospace`;
          const w = ctx.measureText(shape.value || "").width;
          const h = +(shape.size || 20);
          const pts = getHandlePointsRect(+shape.x, +shape.y - h, w, h);
          for (let i = 0; i < pts.length; i++) {
            if (Math.abs(x - pts[i][0]) <= hs && Math.abs(y - pts[i][1]) <= hs)
              return i;
          }
        }
        return -1;
      }

      // =========================================
      // Resize logic
      // =========================================
      function applyHandleMove(cmd, handleIdx, dx, dy, orig) {
        if (cmd === "rect") {
          let { x, y, w, h } = orig;
          x = +x;
          y = +y;
          w = +w;
          h = +h;
          switch (handleIdx) {
            case 0:
              x += dx;
              y += dy;
              w -= dx;
              h -= dy;
              break; // TL
            case 1:
              y += dy;
              h -= dy;
              break; // TC
            case 2:
              y += dy;
              w += dx;
              h -= dy;
              break; // TR
            case 3:
              x += dx;
              w -= dx;
              break; // ML
            case 4:
              w += dx;
              break; // MR
            case 5:
              x += dx;
              w -= dx;
              h += dy;
              break; // BL
            case 6:
              h += dy;
              break; // BC
            case 7:
              w += dx;
              h += dy;
              break; // BR
          }
          if (w < 5) {
            x = x + w - 5;
            w = 5;
          }
          if (h < 5) {
            y = y + h - 5;
            h = 5;
          }
          return {
            x: Math.round(x),
            y: Math.round(y),
            w: Math.round(w),
            h: Math.round(h),
          };
        } else if (cmd === "circle") {
          const delta = [-dy, dx, dy, -dx][handleIdx] ?? 0;
          return { r: Math.max(5, Math.round(+orig.r + delta)) };
        } else if (cmd === "text") {
          // For text, only allow size change via TC/BC (increase/decrease size)
          let { x, y, w, h } = orig;
          x = +x;
          y = +y;
          w = +w;
          h = +h;
          switch (handleIdx) {
            case 0:
              x += dx;
              y += dy;
              w -= dx;
              h -= dy;
              break;
            case 1:
              y += dy;
              h -= dy;
              break;
            case 2:
              y += dy;
              w += dx;
              h -= dy;
              break;
            case 3:
              x += dx;
              w -= dx;
              break;
            case 4:
              w += dx;
              break;
            case 5:
              x += dx;
              w -= dx;
              h += dy;
              break;
            case 6:
              h += dy;
              break;
            case 7:
              w += dx;
              h += dy;
              break;
          }
          return {
            x: Math.round(x),
            y: Math.round(y + h),
            size: Math.max(8, Math.round(h)),
          };
        }
        return {};
      }

      // =========================================
      // Mouse Events
      // =========================================
      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        return { x: e.clientX - r.left, y: e.clientY - r.top };
      }

      canvas.addEventListener("mousedown", (e) => {
        const { x, y } = getPos(e);
        isDown = true;
        mouseStart = { x, y };

        if (tool === "select") {
          const sel = shapes[selectedId];
          if (sel) {
            const h = hitHandle(x, y, sel);
            if (h !== -1) {
              // Grab handle — compute text bounding box for text shapes
              let origExtra = {};
              if (sel.cmd === "text") {
                ctx.font = `${+(sel.size || 20)}px 'Courier New', monospace`;
                origExtra = {
                  w: ctx.measureText(sel.value || "").width,
                  h: +(sel.size || 20),
                };
              }
              dragState = {
                type: "handle",
                handleIdx: h,
                startX: x,
                startY: y,
                origShape: { ...sel, ...origExtra },
              };
              return;
            }
          }
          const hit = hitTest(x, y);
          if (hit) {
            selectShape(hit);
            dragState = {
              type: "move",
              startX: x,
              startY: y,
              origShape: { ...shapes[hit] },
            };
          } else {
            selectShape(null);
          }
        } else if (tool === "text") {
          const id = genId();
          const s = {
            cmd: "text",
            id,
            x: Math.round(x),
            y: Math.round(y),
            value: "Text",
            size: 20,
            color: currentColor(),
          };
          shapes[id] = s;
          sendOut(encode(s));
          selectShape(id);
          redraw();
          const val = prompt("Enter text:", "Text");
          if (val !== null && shapes[id]) {
            const old = { ...shapes[id] };
            shapes[id].value = val;
            sendOut(encode({ op: "update", id, value: val }));
          } else if (val === null) {
            delete shapes[id];
          }
          redraw();
        } else {
          drawState = { type: tool, startX: x, startY: y, previewShape: null };
        }
      });

      canvas.addEventListener("mousemove", (e) => {
        const { x, y } = getPos(e);

        // Cursor when not dragging
        if (!isDown) {
          if (tool !== "select") {
            canvas.style.cursor = "crosshair";
            return;
          }
          const sel = shapes[selectedId];
          if (sel) {
            const h = hitHandle(x, y, sel);
            if (h !== -1) {
              const cursors = [
                "nw-resize",
                "n-resize",
                "ne-resize",
                "w-resize",
                "e-resize",
                "sw-resize",
                "s-resize",
                "se-resize",
              ];
              canvas.style.cursor = cursors[h] ?? "pointer";
              return;
            }
          }
          canvas.style.cursor = hitTest(x, y) ? "move" : "default";
          return;
        }

        if (dragState) {
          const s = shapes[dragState.origShape.id];
          if (!s) return;
          const dx = x - dragState.startX;
          const dy = y - dragState.startY;

          if (dragState.type === "move") {
            shapes[s.id].x = Math.round(+dragState.origShape.x + dx);
            shapes[s.id].y = Math.round(+dragState.origShape.y + dy);
          } else if (dragState.type === "handle") {
            const patch = applyHandleMove(
              s.cmd,
              dragState.handleIdx,
              dx,
              dy,
              dragState.origShape,
            );
            Object.assign(shapes[s.id], patch);
          }
          updatePropsPanel();
          redraw();
          return;
        }

        if (drawState) {
          const x1 = Math.min(drawState.startX, x),
            y1 = Math.min(drawState.startY, y);
          const x2 = Math.max(drawState.startX, x),
            y2 = Math.max(drawState.startY, y);
          if (drawState.type === "rect") {
            drawState.previewShape = {
              cmd: "rect",
              id: "_preview",
              x: x1,
              y: y1,
              w: x2 - x1,
              h: y2 - y1,
              color: currentColor(),
            };
          } else if (drawState.type === "circle") {
            const r = Math.max(x2 - x1, y2 - y1) / 2;
            drawState.previewShape = {
              cmd: "circle",
              id: "_preview",
              x: (x1 + x2) / 2,
              y: (y1 + y2) / 2,
              r,
              color: currentColor(),
            };
          }
          redraw();
        }
      });

      canvas.addEventListener("mouseup", (e) => {
        const { x, y } = getPos(e);

        if (dragState) {
          const s = shapes[dragState.origShape.id];
          if (s) {
            const orig = dragState.origShape;
            const diff = {};
            for (const k of ["x", "y", "w", "h", "r", "size"]) {
              if (s[k] !== undefined && String(s[k]) !== String(orig[k]))
                diff[k] = s[k];
            }
            if (Object.keys(diff).length > 0) {
              sendOut(encode({ op: "update", id: s.id, ...diff }));
            }
          }
          dragState = null;
          redraw();
        } else if (drawState?.previewShape) {
          const ps = drawState.previewShape;
          const ok =
            (ps.cmd === "rect" && +ps.w > 5 && +ps.h > 5) ||
            (ps.cmd === "circle" && +ps.r > 5);
          if (ok) {
            const id = genId();
            const s = {
              ...ps,
              id,
              x: Math.round(+ps.x),
              y: Math.round(+ps.y),
              ...(ps.cmd === "rect"
                ? { w: Math.round(+ps.w), h: Math.round(+ps.h) }
                : {}),
              ...(ps.cmd === "circle" ? { r: Math.round(+ps.r) } : {}),
            };
            shapes[id] = s;
            sendOut(encode(s));
            selectShape(id);
          }
        }

        isDown = false;
        drawState = null;
        redraw();
      });

      // =========================================
      // Selection & Props Panel
      // =========================================
      function selectShape(id) {
        selectedId = id;
        updatePropsPanel();
        redraw();
      }

      function updatePropsPanel() {
        const s = shapes[selectedId];
        document.getElementById("no-selection").style.display = s
          ? "none"
          : "block";
        document.getElementById("shape-props").style.display = s
          ? "flex"
          : "none";
        if (!s) return;

        document.getElementById("prop-id").value = s.id;
        document.getElementById("prop-x").value = Math.round(+s.x);
        document.getElementById("prop-y").value = Math.round(+s.y);

        document.getElementById("wh-props").style.display =
          s.cmd === "rect" ? "block" : "none";
        document.getElementById("r-prop").style.display =
          s.cmd === "circle" ? "block" : "none";
        document.getElementById("text-prop").style.display =
          s.cmd === "text" ? "flex" : "none";

        if (s.cmd === "rect") {
          document.getElementById("prop-w").value = Math.round(+s.w);
          document.getElementById("prop-h").value = Math.round(+s.h);
        }
        if (s.cmd === "circle") {
          document.getElementById("prop-r").value = Math.round(+s.r);
        }
        if (s.cmd === "text") {
          document.getElementById("prop-value").value = s.value || "";
          document.getElementById("prop-size").value = +(s.size || 20);
        }

        document.getElementById("prop-color").value =
          cssToHex(s.color) || "#4488ff";
      }

      function cssToHex(c) {
        if (!c) return "#4488ff";
        if (/^#[0-9a-fA-F]{3,6}$/.test(c)) return c;
        const d = document.createElement("div");
        d.style.color = c;
        document.body.appendChild(d);
        const comp = getComputedStyle(d).color;
        document.body.removeChild(d);
        const m = comp.match(/\d+/g);
        if (!m) return "#ffffff";
        return (
          "#" +
          m
            .slice(0, 3)
            .map((n) => (+n).toString(16).padStart(2, "0"))
            .join("")
        );
      }

      // Prop input → send update
      function propChanged(key, val) {
        if (!selectedId || !shapes[selectedId]) return;
        const orig = { ...shapes[selectedId] };
        shapes[selectedId][key] = val;
        sendOut(encode({ op: "update", id: selectedId, [key]: val }));
        redraw();
      }

      ["prop-x", "prop-y", "prop-w", "prop-h", "prop-r", "prop-size"].forEach(
        (elId) => {
          const el = document.getElementById(elId);
          if (!el) return;
          const keyMap = {
            "prop-x": "x",
            "prop-y": "y",
            "prop-w": "w",
            "prop-h": "h",
            "prop-r": "r",
            "prop-size": "size",
          };
          el.addEventListener("change", (e) =>
            propChanged(keyMap[elId], +e.target.value),
          );
        },
      );

      document.getElementById("prop-value").addEventListener("change", (e) => {
        propChanged("value", e.target.value);
      });

      document.getElementById("prop-color").addEventListener("input", (e) => {
        propChanged("color", e.target.value);
      });

      function currentColor() {
        return document.getElementById("prop-color").value || "#4488ff";
      }

      // =========================================
      // Toolbar
      // =========================================
      document.querySelectorAll(".tool-btn[data-tool]").forEach((btn) => {
        btn.addEventListener("click", () => {
          tool = btn.dataset.tool;
          document
            .querySelectorAll(".tool-btn[data-tool]")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          if (tool !== "select") selectShape(null);
        });
      });

      document
        .getElementById("delete-btn")
        .addEventListener("click", deleteSelected);
      document.getElementById("clear-btn").addEventListener("click", () => {
        shapes = {};
        selectShape(null);
        sendOut(encode({ op: "clear" }));
        redraw();
      });

      function deleteSelected() {
        if (!selectedId) return;
        sendOut(encode({ op: "delete", id: selectedId }));
        delete shapes[selectedId];
        selectShape(null);
        redraw();
      }

      window.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT") return;
        const map = {
          v: "select",
          V: "select",
          r: "rect",
          R: "rect",
          c: "circle",
          C: "circle",
          t: "text",
          T: "text",
        };
        if (map[e.key]) {
          document.querySelector(`[data-tool="${map[e.key]}"]`).click();
        }
        if (e.key === "Delete" || e.key === "Backspace") deleteSelected();
        if (e.key === "Escape") selectShape(null);
      });

      // =========================================
      // Protocol I/O
      // =========================================
      function sendOut(msg) {
        console.log("[OUT]", msg);
        addLog("out", msg);
      }

      function receiveMsg(raw) {
        console.log("[IN]", raw);
        addLog("in", raw);
        raw.split("|").forEach((part) => {
          part = part.trim();
          if (part) applyMsg(part);
        });
        redraw();
        updatePropsPanel();
      }

      function applyMsg(str) {
        const d = decode(str);

        if (d.op === "delete") {
          delete shapes[d.id];
          if (selectedId === d.id) selectShape(null);
        } else if (d.op === "update") {
          if (!shapes[d.id]) return;
          const { op, id, ...rest } = d;
          for (const k of ["x", "y", "w", "h", "r", "size"]) {
            if (rest[k] !== undefined) rest[k] = +rest[k];
          }
          Object.assign(shapes[d.id], rest);
        } else if (d.op === "clear") {
          shapes = {};
          selectShape(null);
        } else if (d.cmd) {
          const { cmd, id, ...rest } = d;
          for (const k of ["x", "y", "w", "h", "r", "size"]) {
            if (rest[k] !== undefined) rest[k] = +rest[k];
          }
          shapes[id] = { cmd, id, ...rest };
          const num = parseInt(id.replace(/\D/g, ""));
          if (!isNaN(num) && num >= idCounter) idCounter = num;
        }
      }

      // =========================================
      // Log
      // =========================================
      const logEl = document.getElementById("log");

      function addLog(dir, msg) {
        const el = document.createElement("div");
        el.className = `log-entry ${dir}`;
        el.innerHTML =
          `<span class="dir">${dir === "out" ? "▶ OUT" : "◀ IN "}</span>` +
          `<span class="msg">${esc(msg)}</span>`;
        logEl.appendChild(el);
        logEl.scrollTop = logEl.scrollHeight;
        while (logEl.children.length > 60) logEl.removeChild(logEl.firstChild);
      }

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // =========================================
      // Input field
      // =========================================
      const msgInput = document.getElementById("msg-input");

      document.getElementById("recv-btn").addEventListener("click", sendInput);
      msgInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendInput();
      });

      function sendInput() {
        const v = msgInput.value.trim();
        if (v) {
          receiveMsg(v);
          msgInput.value = "";
        }
      }
    </script>
  </body>
</html>
